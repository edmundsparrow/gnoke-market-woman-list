<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Market Woman List — Gnoke</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  <link rel="icon" type="image/png" href="../global.png" />
  <link rel="apple-touch-icon" href="../global.png" />
  <link rel="manifest" href="../manifest.json" />
  <!-- Theme flicker prevention -->
  <script>(function(){ var t=localStorage.getItem('gnoke_market_theme'); if(t) document.documentElement.setAttribute('data-theme',t); })();</script>
</head>
<body>

<!-- LOADER -->
<div id="app-loader">
  <div class="loader-icon">🛒</div>
  <div class="loader-label">Loading market list…</div>
</div>

<!-- APP ROOT -->
<div id="app-root">

  <!-- TOPBAR -->
  <header id="topbar">
    <div id="topbar-left">
      <div id="topbar-brand">
        <span id="topbar-gnoke">Gnoke</span>
        <span id="topbar-app">Market Woman List</span>
      </div>
    </div>
    <div id="topbar-right">
      <button class="icon-btn theme-toggle-btn" title="Toggle theme">🌙</button>
    </div>
  </header>

  <!-- PAGES -->
  <main class="pages">

    <!-- ── TRIPS LIST PAGE ── -->
    <section id="trips-page" class="page">
      <div class="page-content">

        <div class="page-header">
          <div>
            <h1>Market Lists</h1>
            <p class="sub">Your shopping trips</p>
          </div>
          <button class="btn btn-primary" id="btn-new-trip">+ New Trip</button>
        </div>

        <div id="trips-list"></div>

        <div id="trips-empty">
          <div class="empty-icon">🧺</div>
          <div class="empty-title">No trips yet</div>
          <div class="empty-hint">Create a trip to start your market list.</div>
        </div>

      </div>
    </section>


    <!-- ── MARKET LIST PAGE ── -->
    <section id="list-page" class="page">
      <div class="page-content">

        <div class="page-header">
          <div>
            <h1 id="list-title"></h1>
            <p class="sub" id="list-sub"></p>
          </div>
          <button class="btn btn-ghost btn-sm" id="btn-back-to-trips">← Back</button>
        </div>

        <!-- Progress -->
        <div class="list-header-meta">
          <span>Progress</span>
          <span id="list-pct">0%</span>
        </div>
        <div class="list-progress-wrap">
          <div class="list-progress-fill" id="list-progress-fill" style="width:0%"></div>
        </div>

        <!-- Budget summary -->
        <div id="list-summary"></div>

        <!-- Items -->
        <div id="list-items"></div>

        <!-- Add item — collapsed by default -->
        <div class="add-item-section" id="add-item-section">
          <button class="add-item-toggle" id="btn-toggle-add" aria-expanded="false">
            <span class="add-toggle-icon">＋</span>
            <span class="add-toggle-label">Add item</span>
            <span class="add-toggle-chevron">›</span>
          </button>
          <div class="add-item-body" id="add-item-body">
            <div class="add-item-body-inner">
              <div class="add-main-row">
                <input type="text" id="new-item-input" placeholder="e.g. Tomatoes, Palm oil, Ogbono…" autocomplete="off" />
                <button class="btn btn-primary" id="btn-add-item">Add</button>
              </div>
              <div class="add-meta-row">
                <div class="form-group">
                  <label class="field-label" for="new-item-price">Price (₦)</label>
                  <input type="number" id="new-item-price" placeholder="0.00" min="0" step="50" />
                </div>
                <div class="form-group">
                  <label class="field-label" for="new-item-qty">Qty</label>
                  <input type="number" id="new-item-qty" placeholder="1" min="0.1" step="0.5" value="1" />
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Toolbar -->
        <div class="list-toolbar">
          <button class="btn btn-ghost btn-sm" id="btn-reset-list">↺ Uncheck all</button>
        </div>

      </div>
    </section>

  </main>

</div><!-- /app-root -->


<!-- MODALS -->

<!-- New Trip -->
<div class="modal-overlay" id="new-trip-modal">
  <div class="modal">
    <div class="modal-head">
      <h3>New Market Trip</h3>
      <button class="modal-close" onclick="UI.closeModal('new-trip-modal')">✕</button>
    </div>
    <div class="form-group">
      <label class="field-label" for="new-trip-name">Trip name / reason</label>
      <input type="text" id="new-trip-name" placeholder="e.g. Ogbono soup, Groceries, Jellof rice…" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="field-label" for="new-trip-budget">Budget (₦) — optional</label>
        <input type="number" id="new-trip-budget" placeholder="e.g. 15000" min="0" step="500" />
      </div>
    </div>
    <div class="form-group">
      <label class="field-label" for="new-trip-note">Note — optional</label>
      <input type="text" id="new-trip-note" placeholder="e.g. Check Mile 12 for tomatoes" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btn-cancel-trip">Cancel</button>
      <button class="btn btn-primary" id="btn-confirm-trip">Create Trip</button>
    </div>
  </div>
</div>

<!-- Edit Item -->
<div class="modal-overlay" id="edit-item-modal">
  <div class="modal">
    <div class="modal-head">
      <h3>Edit Item</h3>
      <button class="modal-close" onclick="UI.closeModal('edit-item-modal')">✕</button>
    </div>
    <input type="hidden" id="edit-item-id" />
    <div class="form-group">
      <label class="field-label" for="edit-item-label">Item name</label>
      <input type="text" id="edit-item-label" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="field-label" for="edit-item-price">Price (₦)</label>
        <input type="number" id="edit-item-price" placeholder="0.00" min="0" step="50" />
      </div>
      <div class="form-group">
        <label class="field-label" for="edit-item-qty">Qty</label>
        <input type="number" id="edit-item-qty" placeholder="1" min="0.1" step="0.5" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btn-cancel-edit">Cancel</button>
      <button class="btn btn-primary" id="btn-confirm-edit">Save Changes</button>
    </div>
  </div>
</div>


<div id="toast"></div>

<!-- SCRIPTS -->
<!-- sql.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script src="../js/state.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/db.js"></script>
<script src="../js/app.js"></script>
<script src="menu.js"></script>

<!-- PWA Service Worker -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('../sw.js').catch(() => {}));
  }
</script>

</body>
</html>
